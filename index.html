<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Перевод запчастей</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body {
  margin: 0;
  background: #14171c;
  color: #e8eaed;
  font-family: Arial, sans-serif;
}

.wrap {
  max-width: 900px;
  margin: auto;
  padding: 40px;
}

.panel {
  background: #1c2129;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
  border: 1px solid #2a3140;
}

button {
  padding: 12px 18px;
  border: 0;
  background: #ff7a33;
  color: black;
  font-weight: bold;
  cursor: pointer;
  border-radius: 6px;
}

button:disabled {
  opacity: 0.5;
}

.status {
  margin-top: 10px;
  font-size: 14px;
}

.progress {
  height: 8px;
  background: #2a3140;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 10px;
}

.bar {
  height: 100%;
  width: 0%;
  background: #ff7a33;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="panel">
    <h2>Excel перевод запчастей</h2>

    <input type="file" id="file"/>

    <br/><br/>

    <select id="sheet"></select>
    <select id="column"></select>

    <br/><br/>

    <button id="start">Запустить перевод</button>

    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <div class="status" id="status"></div>
  </div>

</div>

<script>
let workbook;

const fileInput = document.getElementById('file');
const sheetSel = document.getElementById('sheet');
const colSel = document.getElementById('column');
const startBtn = document.getElementById('start');
const status = document.getElementById('status');
const bar = document.getElementById('bar');

fileInput.addEventListener('change', e => {
  const reader = new FileReader();

  reader.onload = (evt) => {
    const data = new Uint8Array(evt.target.result);
    workbook = XLSX.read(data, { type: 'array' });

    sheetSel.innerHTML = '';
    workbook.SheetNames.forEach(s => {
      sheetSel.innerHTML += `<option>${s}</option>`;
    });

    loadColumns();
  };

  reader.readAsArrayBuffer(e.target.files[0]);
});

sheetSel.addEventListener('change', loadColumns);

function loadColumns() {
  const sheet = workbook.Sheets[sheetSel.value];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const headers = rows[0];

  colSel.innerHTML = '';

  headers.forEach((h, i) => {
    colSel.innerHTML += `<option value="${i}">${h || ('Колонка ' + i)}</option>`;
  });
}

startBtn.onclick = async () => {
  startBtn.disabled = true;

  const sheet = workbook.Sheets[sheetSel.value];
  const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

  const col = parseInt(colSel.value);

  const items = rows.slice(1)
    .map(r => r[col])
    .filter(Boolean);

  // 1️⃣ создаём job
  const job = await fetch('/api/upload', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ items })
  }).then(r => r.json());

  status.innerText = 'Задача создана. ID: ' + job.jobId;

  // 2️⃣ запускаем обработку
  fetch('/api/process?jobId=' + job.jobId);

  // 3️⃣ polling статуса
  let done = false;
  let result;

  while (!done) {
    const j = await fetch('/api/status?jobId=' + job.jobId).then(r => r.json());

    if (j.status === 'done') {
      done = true;
      result = j.result;
    }

    if (j.status === 'error') {
      status.innerText = 'Ошибка: ' + j.error;
      return;
    }

    const p = j.progress || 0;
    bar.style.width = p + '%';
    status.innerText = `Обработка: ${p}%`;

    await new Promise(r => setTimeout(r, 2000));
  }

  // 4️⃣ собираем Excel
  const newRows = rows.map((r, i) => {
    if (i === 0) return [...r, 'Перевод', 'Описание'];

    const item = result[i - 1] || {};

    return [
      ...r,
      item.translation || '',
      item.customs_description || ''
    ];
  });

  const ws = XLSX.utils.aoa_to_sheet(newRows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'result');

  XLSX.writeFile(wb, 'translated.xlsx');

  status.innerText = 'Готово';
  startBtn.disabled = false;
};
</script>

</body>
</html>
